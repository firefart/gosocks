version: "3"

vars:
  PROGRAM: gosocks

tasks:
  deps:
    cmds:
      - go mod tidy -v

  update:
    cmds:
      - go get -u
      - go mod tidy -v

  setup:
    cmds:
      - go install mvdan.cc/gofumpt@latest

  build:
    aliases: [default]
    deps: [deps]
    env:
      CGO_ENABLED: 0
    cmds:
      - go fmt ./...
      - gofumpt -l -w .
      - go vet ./...
      - go build -o {{.PROGRAM}} examples/default/main.go

  build-examples:
    cmds:
      - go build examples/default/main.go
      - go build examples/custom/main.go

  test:
    deps: [deps]
    env:
      CGO_ENABLED: 1 # required by -race
    cmds:
      - go test -race -cover ./...

  lint:
    cmds:
      - golangci-lint run ./... --timeout=30m
      - go mod tidy

  lint-update:
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

  tag:
    cmds:
      - git tag -a "${TAG}" -m "${TAG}"
      - git push origin "${TAG}"
    preconditions:
      - sh: '[[ -n "${TAG}" ]]'
        msg: "Please set the TAG environment variable"
